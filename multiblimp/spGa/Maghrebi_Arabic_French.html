<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>No tree — single label</title>
  <style>
    body { font-family: "DM Sans", sans-serif; display: flex; justify-content: center;
            align-items: center; height: 100vh; margin: 0; background: white; color: #1c1917; }
    .box { text-align: center; max-width: 480px; padding: 2rem; }
    h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p  { color: #78716c; font-size: 0.95rem; }
    .label { display: inline-block; margin-top: 1rem; padding: 0.3rem 0.9rem;
              background: #f5f5f4; border-radius: 999px; font-weight: 600; font-size: 1.1rem; }
    .meta { margin-top: 1.5rem; text-align: left; font-size: 0.85rem; }
    .meta-row { display: flex; justify-content: space-between; padding: 0.2rem 0;
                 border-bottom: 1px solid #e7e5e4; }
    .meta-key { color: #78716c; }
  </style>
</head>
<body>
  <div class="box">
    <h2>No decision tree to display</h2>
    <p>All training samples for <b>head_nsubj_Gender_agreement</b> belong to a single label —
       no splits were needed.</p>
    <div class="label">--</div>
    <div class="meta"><div class="meta-row"><span class="meta-key">Language</span><span class="meta-val">Maghrebi_Arabic_French</span></div><div class="meta-row"><span class="meta-key">Training samples</span><span class="meta-val">16</span></div><div class="meta-row"><span class="meta-key">Predictor</span><span class="meta-val">head_nsubj_Gender_agreement</span></div></div>
  </div>
</body>
</html>
